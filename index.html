<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Last Outpost</title>
    <link rel="icon" type="image/png" href="./src/images/icone.png" />
    <link rel="stylesheet" href="./src/styles/auth.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background-color: #050505;
        overflow: hidden;
        touch-action: none;
      }

      #game-layout {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 12px;
      }

      #hud-root,
      #toolbar-root {
        width: 100%;
        pointer-events: auto;
      }

      #game-shell {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Le conteneur du jeu */
      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        aspect-ratio: 1 / 1;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        margin: 0;
        padding: 0;
        transition: opacity 0.3s ease, filter 0.3s ease;
      }

      /* Désactiver les interactions avec le jeu quand l'overlay est visible */
      body:has(#auth-overlay:not(.hidden)) #game-container,
      body:has(#auth-overlay:not(.hidden)) #hud-root,
      body:has(#auth-overlay:not(.hidden)) #toolbar-root,
      #game-container.blocked {
        pointer-events: none;
        user-select: none;
        opacity: 0.5;
        filter: blur(2px);
      }

      body:has(#auth-overlay:not(.hidden)) canvas,
      #game-container.blocked canvas {
        pointer-events: none;
        cursor: not-allowed !important;
      }

      canvas {
        display: block;
        margin: 0 !important;
        padding: 0;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      .hidden {
        display: none !important;
      }

      /* Conteneur Vue - au-dessus de tout */
      #vue-app-container {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10000;
      }

      /* Seuls les overlays actifs doivent intercepter les clics */
      #vue-app-container .game-result-overlay,
      #vue-app-container .hero-modal-overlay,
      #vue-app-container .achievements-overlay,
      #vue-app-container .hero-upgrade-panel {
        pointer-events: auto;
      }

      /* Le reste ne doit pas bloquer */
      #vue-app-container > * {
        pointer-events: none;
      }

      #vue-app {
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      @media (orientation: landscape) {
        #game-layout {
          flex-direction: row;
          align-items: stretch;
        }

        #hud-root,
        #toolbar-root {
          flex: 0 0 clamp(220px, 22vw, 320px);
          height: 100%;
        }

        #game-shell {
          flex: 1;
        }

        #game-container {
          height: 100%;
          width: auto;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <div id="game-layout">
      <div id="hud-root"></div>
      <div id="game-shell">
        <div id="game-container"></div>
      </div>
      <div id="toolbar-root"></div>
    </div>

    <script type="module" src="./src/main.js"></script>
    <script></script>
  </body>
</html>
