<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Last Outpost TD</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        background-color: #050505;
        overflow: hidden;
        touch-action: none;
        
        /* Permet d'empiler le jeu et tes éventuels autres éléments */
        display: flex;
        flex-direction: column; 
      }

      /* Le conteneur du jeu */
      #game-container {
        flex: 1; 
        width: 100%;
        height: 100%;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        margin: 0;
        padding: 0;
      }

      canvas {
        display: block;
        margin: 0 !important;
        padding: 0;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <div id="game-container"></div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
