<!DOCTYPE html><html lang="fr"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Last Outpost TD</title>
    <style>* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  touch-action: none;
  background-color: #050505;
  flex-direction: column;
  width: 100%;
  height: 100%;
  display: flex;
  overflow: hidden;
}

#game-container {
  flex: 1;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  display: flex;
  position: relative;
  overflow: hidden;
}

canvas {
  padding: 0;
  display: block;
  box-shadow: 0 0 20px #00000080;
  margin: 0 !important;
}

#orientation-warning {
  z-index: 9999;
  color: #fff;
  text-align: center;
  background: radial-gradient(circle at 30% 30%, #1a1a1a 0, #050505 55%);
  justify-content: center;
  align-items: center;
  padding: 24px;
  display: none;
  position: fixed;
  inset: 0;
}

#orientation-warning.visible {
  display: flex;
}

#orientation-warning .card {
  background: linear-gradient(145deg, #202020f2, #0c0c0cf2);
  border: 1px solid #ffffff1a;
  border-radius: 16px;
  width: 100%;
  max-width: 460px;
  padding: 24px;
  box-shadow: 0 16px 50px #00000073;
}

#orientation-warning h1 {
  letter-spacing: .5px;
  margin-bottom: 12px;
  font-family: Segoe UI, Inter, system-ui, -apple-system, sans-serif;
  font-size: 20px;
}

#orientation-warning p {
  color: #cfcfcf;
  font-family: Segoe UI, Inter, system-ui, -apple-system, sans-serif;
  line-height: 1.6;
}

#orientation-warning .icon {
  margin-bottom: 12px;
  font-size: 44px;
}
</style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <div id="game-container"></div>

    <div id="orientation-warning" aria-live="polite">
      <div class="card">
        <div class="icon">📱↔️</div>
        <h1>Tourne ton écran</h1>
        <p>
          Le jeu se joue en mode paysage pour profiter d'une grande carte carrée.
          Passe ton téléphone ou ta tablette à l'horizontale pour continuer.
        </p>
      </div>
    </div>

    <script type="module" src="/towerdefense.1fcc916e.js"></script>
    <script>const warning = document.getElementById("orientation-warning");
function toggleOrientationWarning() {
    const isPortrait = window.innerHeight > window.innerWidth;
    if (warning) warning.classList.toggle("visible", isPortrait);
}
toggleOrientationWarning();
window.addEventListener("resize", toggleOrientationWarning);
window.addEventListener("orientationchange", ()=>{
    setTimeout(toggleOrientationWarning, 150);
});

</script>
  

</body></html>
