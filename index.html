<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Last Outpost</title>
    <link rel="icon" type="image/png" href="./src/images/icone.png" />
    <link rel="stylesheet" href="./src/styles/auth.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background-color: #050505;
        overflow: hidden;
        touch-action: none;

        display: flex;
        flex-direction: column;
      }

      /* Le conteneur du jeu */
      #game-container {
        position: relative;
        flex: 1;
        width: 100%;
        height: 100%;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        margin: 0;
        padding: 0;
        transition: opacity 0.3s ease, filter 0.3s ease;
      }

      /* Désactiver les interactions avec le jeu quand l'overlay est visible */
      body:has(#auth-overlay:not(.hidden)) #game-container,
      #game-container.blocked {
        pointer-events: none;
        user-select: none;
        opacity: 0.5;
        filter: blur(2px);
      }

      body:has(#auth-overlay:not(.hidden)) canvas,
      #game-container.blocked canvas {
        pointer-events: none;
        cursor: not-allowed !important;
      }

      canvas {
        display: block;
        margin: 0 !important;
        padding: 0;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      #orientation-warning {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(circle at 20% 20%, rgba(0, 242, 255, 0.06), transparent 45%),
                    radial-gradient(circle at 80% 30%, rgba(255, 0, 0, 0.05), transparent 40%),
                    rgba(0, 0, 0, 0.78);
        z-index: 30;
      }

      #orientation-warning .card {
        max-width: 460px;
        width: 100%;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: linear-gradient(145deg, rgba(32, 32, 32, 0.95), rgba(12, 12, 12, 0.95));
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.45);
        padding: 24px;
      }

      #orientation-warning h1 {
        font-family: "Segoe UI", "Inter", system-ui, -apple-system, sans-serif;
        font-size: 20px;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
      }

      #orientation-warning p {
        font-family: "Segoe UI", "Inter", system-ui, -apple-system, sans-serif;
        line-height: 1.6;
        color: #cfcfcf;
      }

      #orientation-warning .icon {
        font-size: 44px;
        margin-bottom: 12px;
      }

      .hidden {
        display: none !important;
      }

      /* Conteneur Vue - au-dessus de tout */
      #vue-app-container {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10000;
      }

      /* Seuls les overlays actifs doivent intercepter les clics */
      #vue-app-container .game-result-overlay,
      #vue-app-container .hero-modal-overlay,
      #vue-app-container .achievements-overlay,
      #vue-app-container .hero-upgrade-panel {
        pointer-events: auto;
      }

      /* Le reste ne doit pas bloquer */
      #vue-app-container > * {
        pointer-events: none;
      }

      #vue-app {
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <div id="game-container"></div>

    <div id="orientation-warning" aria-live="polite" class="hidden">
      <div class="card">
        <div class="icon" aria-hidden="true">🖥️</div>
        <h1>Version PC requise</h1>
        <p>
          Last Outpost n’est pas jouable sur mobile pour le moment.
          Merci d’utiliser un ordinateur de bureau ou un ordinateur portable
          pour profiter du jeu.
        </p>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
    <script></script>
  </body>
</html>
