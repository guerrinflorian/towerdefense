<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Last Outpost</title>
    <link rel="icon" type="image/png" href="./src/images/icone.png" />
    <link rel="stylesheet" href="./src/styles/auth.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background-color: #050505;
        overflow: hidden;
        touch-action: none;

        display: flex;
        flex-direction: column;
      }

      /* Le conteneur du jeu */
      #game-container {
        position: relative;
        flex: 1;
        width: 100%;
        height: 100%;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        margin: 0;
        padding: 0;
        transition: opacity 0.3s ease, filter 0.3s ease;
      }

      /* Désactiver les interactions avec le jeu quand l'overlay est visible */
      body:has(#auth-overlay:not(.hidden)) #game-container,
      #game-container.blocked {
        pointer-events: none;
        user-select: none;
        opacity: 0.5;
        filter: blur(2px);
      }

      body:has(#auth-overlay:not(.hidden)) canvas,
      #game-container.blocked canvas {
        pointer-events: none;
        cursor: not-allowed !important;
      }

      canvas {
        display: block;
        margin: 0 !important;
        padding: 0;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      #orientation-warning {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: radial-gradient(circle at 30% 30%, #1a1a1a 0, #050505 55%);
        color: #ffffff;
        display: none;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }

      #orientation-warning.visible {
        display: flex;
      }

      #orientation-warning .card {
        max-width: 460px;
        width: 100%;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: linear-gradient(145deg, rgba(32, 32, 32, 0.95), rgba(12, 12, 12, 0.95));
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.45);
        padding: 24px;
      }

      #orientation-warning h1 {
        font-family: "Segoe UI", "Inter", system-ui, -apple-system, sans-serif;
        font-size: 20px;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
      }

      #orientation-warning p {
        font-family: "Segoe UI", "Inter", system-ui, -apple-system, sans-serif;
        line-height: 1.6;
        color: #cfcfcf;
      }

      #orientation-warning .icon {
        font-size: 44px;
        margin-bottom: 12px;
      }

      .hidden {
        display: none !important;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <div id="game-container"></div>

    <div id="orientation-warning" aria-live="polite">
      <div class="card">
        <div class="icon">📱↔️</div>
        <h1>Tourne ton écran</h1>
        <p>
          Le jeu se joue en mode paysage pour profiter d'une grande carte carrée.
          Passe ton téléphone ou ta tablette à l'horizontale pour continuer.
        </p>
      </div>
    </div>

    <div id="auth-overlay" class="auth-overlay hidden" aria-live="polite">
      <div class="auth-card" id="login-card">
        <h2>Connexion</h2>
        <div id="auth-welcome" class="hint"></div>
        <div id="auth-error" class="error hidden"></div>
        <form id="login-form">
          <div>
            <label for="identifier">Email ou pseudo</label>
            <input id="identifier" name="identifier" type="text" required />
          </div>
          <div>
            <label for="password">Mot de passe</label>
            <input id="password" name="password" type="password" required />
          </div>
          <button type="submit">Se connecter</button>
        </form>
        <p class="hint">
          Pas encore de compte ?
          <a href="#" id="show-register" class="link">Créer un compte</a>
        </p>
      </div>

      <div class="auth-card hidden" id="register-card">
        <h2>Créer un compte</h2>
        <div id="auth-error-register" class="error hidden"></div>
        <form id="register-form">
          <div>
            <label for="username">Nom d'utilisateur (max 15 caractères)</label>
            <input id="username" name="username" maxlength="15" required />
          </div>
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div>
            <label for="password">Mot de passe (8+ caractères)</label>
            <input
              id="register-password"
              name="password"
              type="password"
              required
            />
          </div>
          <button type="submit">Créer mon compte</button>
        </form>
        <p class="hint">
          Déjà inscrit ?
          <a href="#" id="show-login" class="link">Se connecter</a>
        </p>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
    <script>
      const warning = document.getElementById("orientation-warning");

      function toggleOrientationWarning() {
        const isPortrait = window.innerHeight > window.innerWidth;
        if (warning) {
          warning.classList.toggle("visible", isPortrait);
        }
      }

      toggleOrientationWarning();
      window.addEventListener("resize", toggleOrientationWarning);
      window.addEventListener("orientationchange", () => {
        setTimeout(toggleOrientationWarning, 150);
      });
    </script>
  </body>
</html>
